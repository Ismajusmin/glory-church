    --accent2: #BBDEFB;
    --white: #FFFFFF;
    --gray-50: #F8FAFF;
    --gray-100: #EEF2FF;
    --gray-200: #E0E7FF;
    --gray-600: #64748B;
    --gray-800: #1E293B;
    --success: #10B981;
    --danger: #EF4444;
    --warning: #F59E0B;

  body { font-family:'Sarabun',sans-serif; background:#F0F6FF; color:var(--gray-800); min-height:100vh; }

  .navbar-logo { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .navbar-title { font-family:'Prompt',sans-serif; font-weight:700; font-size:17px; line-height:1.2; }
  .navbar-subtitle { font-size:11px; opacity:0.8; font-weight:400; }
  .navbar-user { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.15); border-radius:20px; padding:6px 12px; cursor:pointer; }
  .navbar-avatar { width:26px; height:26px; border-radius:50%; background:var(--secondary); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }

  /* Bottom Nav */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; background:white;
    border-top:1px solid var(--accent2);
    display:flex; height:64px; z-index:100;
    box-shadow: 0 -4px 20px rgba(21,101,192,0.10);
  }
  .bottom-nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; cursor:pointer; transition:all 0.2s; color:var(--gray-600);
    font-size:10px; font-family:'Sarabun',sans-serif;
    border:none; background:none; outline:none;
  }
  .bottom-nav-item.active { color:var(--primary); }
  .bottom-nav-item .nav-icon { font-size:22px; transition:transform 0.2s; }
  .bottom-nav-item.active .nav-icon { transform:translateY(-2px); }
  .nav-dot { width:4px; height:4px; border-radius:50%; background:var(--primary); margin:0 auto; }

  /* Main Content */
  .main-content { flex:1; padding:16px; padding-bottom:80px; max-width:600px; margin:0 auto; width:100%; }

  /* Cards */
  .card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:16px; }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .card-title { font-family:'Prompt',sans-serif; font-weight:600; font-size:16px; color:var(--gray-800); display:flex; align-items:center; gap:8px; }

  .stat-card {
    background:white; border-radius:var(--radius-sm); padding:16px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .stat-card::before { content:''; position:absolute; top:0; right:0; width:60px; height:60px; border-radius:0 0 0 60px; }
  .stat-card.income::before { background:rgba(16,185,129,0.12); }
  .stat-card.expense::before { background:rgba(239,68,68,0.12); }
  .stat-card.balance::before { background:rgba(21,101,192,0.12); }
  .stat-card.transactions::before { background:rgba(245,158,11,0.12); }
  .stat-label { font-size:12px; color:var(--gray-600); margin-bottom:6px; }
  .stat-value { font-family:'Prompt',sans-serif; font-weight:700; font-size:20px; }
  .stat-value.income { color:var(--success); }
  .stat-value.expense { color:var(--danger); }
  .stat-value.balance { color:var(--primary); }
  .stat-value.transactions { color:var(--warning); }
  .stat-icon { font-size:28px; position:absolute; top:12px; right:12px; opacity:0.6; }

  /* Filter Bar */
  .filter-bar { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .filter-bar::-webkit-scrollbar { display:none; }
  .filter-chip {

    border:1.5px solid var(--accent2); background:white; color:var(--gray-600);
    cursor:pointer; transition:all 0.2s; font-family:'Sarabun',sans-serif;
    white-space:nowrap;

  .filter-chip.active { background:var(--primary); color:white; border-color:var(--primary); }

  .tx-icon { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .tx-icon.income { background:rgba(16,185,129,0.12); }
  .tx-icon.expense { background:rgba(239,68,68,0.12); }
  .tx-info { flex:1; min-width:0; }
  .tx-name { font-size:14px; font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx-meta { font-size:12px; color:var(--gray-600); }

  .tx-amount { font-family:'Prompt',sans-serif; font-weight:700; font-size:15px; flex-shrink:0; }
  .tx-amount.income { color:var(--success); }
  .tx-amount.expense { color:var(--danger); }

  .form-group { margin-bottom:16px; }

  .btn {

  .btn-outline { background:white; color:var(--primary); border:1.5px solid var(--primary); }
  .btn-success { background:linear-gradient(135deg, #059669, var(--success)); color:white; box-shadow:0 4px 12px rgba(16,185,129,0.3); }
  .btn-danger { background:linear-gradient(135deg, #DC2626, var(--danger)); color:white; }
  .btn-sm { padding:8px 16px; font-size:13px; width:auto; }

  /* FAB */
  .fab {
    position:fixed; bottom:80px; right:20px; width:56px; height:56px;
    border-radius:50%; background:linear-gradient(135deg, var(--primary), var(--secondary));
    color:white; border:none; font-size:26px; cursor:pointer;
    box-shadow:0 6px 20px rgba(21,101,192,0.45); z-index:99;
    display:flex; align-items:center; justify-content:center;

  /* Modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;

  /* Divider */
  .divider { height:1px; background:var(--gray-100); margin:16px 0; }
  
  /* Section title */

  .input-icon-wrap { position:relative; }
  .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
  .input-icon-wrap .form-control { padding-left:40px; }
  
  @media(max-width:360px) { .stats-grid { grid-template-columns:1fr 1fr; } .stat-value { font-size:17px; } }
</style>

// ===================== FIREBASE =====================
let db = null;
let auth = null;
let firebaseReady = false;

const initFirebase = () => {
  try {
    const loadScript = (src) => new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src; s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js')
      .then(() => loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'))
      .then(() => loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js'))
      .then(() => {
        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.database();
        auth = firebase.auth();
        firebaseReady = true;
        console.log('✅ Firebase + Auth connected');
      });
  } catch(e) { console.error('Firebase init error:', e); }
};

const fbSaveTx = (tx) => { if (db) db.ref('transactions/' + tx.id).set(tx); };
const fbDeleteTx = (id) => { if (db) db.ref('transactions/' + id).remove(); };
const fbListenTx = (callback) => {
  if (!firebaseReady) { setTimeout(() => fbListenTx(callback), 800); return; }
  db.ref('transactions').on('value', snap => {
    const data = snap.val();
    if (data) callback(Object.values(data));
    else callback([]);
  });
};

// Auth helpers
const fbRegister = (email, password) => auth.createUserWithEmailAndPassword(email, password);
const fbLogin = (email, password) => auth.signInWithEmailAndPassword(email, password);
const fbLogout = () => auth.signOut();
const fbOnAuthChange = (cb) => auth ? auth.onAuthStateChanged(cb) : setTimeout(() => fbOnAuthChange(cb), 800);

// User profile in DB
const fbSaveUserProfile = (uid, data) => db.ref('users/' + uid).set(data);
const fbGetUserProfile = (uid) => db.ref('users/' + uid).once('value').then(s => s.val());
const fbListenUsers = (cb) => db.ref('users').on('value', snap => cb(snap.val() || {}));
const fbUpdateUserStatus = (uid, status) => db.ref('users/' + uid + '/status').set(status);
const fbUpdateUserRole = (uid, role) => db.ref('users/' + uid + '/role').set(role);

// ===================== HELPERS =====================
const fmt = (n) => new Intl.NumberFormat('th-TH').format(Math.round(n));
const fmtFull = (n) => '฿' + fmt(n);
const getDeptColor = (dept) => DEPT_COLORS[DEPARTMENTS.indexOf(dept)] || '#64748B';
const getDeptIcon = (dept) => DEPT_ICONS[DEPARTMENTS.indexOf(dept)] || '📌';
const today = () => new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});

const sendTelegram = async (msg) => {
  try {
    if (TELEGRAM_BOT_TOKEN === 'YOUR_BOT_TOKEN') return;
    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TELEGRAM_CHAT_ID, text:msg, parse_mode:'HTML'})
    });
  } catch(e) {}
};

// ===================== COMPONENTS =====================
const Toast = ({ msg, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
};

// ===================== LOGIN & REGISTER =====================
const AuthPage = ({ onLogin }) => {
  const [mode, setMode] = useState('login'); // login | register | pending
  const [form, setForm] = useState({name:'', email:'', password:'', confirm:''});
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState('');

  const handleLogin = async () => {
    if (!form.email || !form.password) { setErr('กรุณากรอกข้อมูลให้ครบ'); return; }
    setLoading(true); setErr('');
    try {
      // Check if firebase auth is ready
      if (!auth) { await new Promise(r => setTimeout(r, 1500)); }
      if (!auth) throw new Error('ระบบยังไม่พร้อม กรุณารอสักครู่');
      const cred = await fbLogin(form.email, form.password);
      const profile = await fbGetUserProfile(cred.user.uid);
      if (!profile) throw new Error('ไม่พบข้อมูลผู้ใช้');
      if (profile.status === 'pending') { setMode('pending'); setLoading(false); return; }
      if (profile.status === 'rejected') throw new Error('บัญชีของคุณถูกปฏิเสธ กรุณาติดต่อ Admin');
      onLogin({ id: cred.user.uid, email: cred.user.email, name: profile.name, role: profile.role || 'user', avatar: profile.name?.[0]?.toUpperCase() || 'U' });
    } catch(e) {
      const msg = e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential' ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : e.message;
      setErr(msg);
    }
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!form.name || !form.email || !form.password || !form.confirm) { setErr('กรุณากรอกข้อมูลให้ครบ'); return; }
    if (form.password !== form.confirm) { setErr('รหัสผ่านไม่ตรงกัน'); return; }
    if (form.password.length < 6) { setErr('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
    setLoading(true); setErr('');
    try {
      if (!auth) { await new Promise(r => setTimeout(r, 1500)); }
      const cred = await fbRegister(form.email, form.password);
      await fbSaveUserProfile(cred.user.uid, {
        name: form.name, email: form.email,
        role: 'user', status: 'pending',
        createdAt: new Date().toISOString()
      });
      await fbLogout();
      setSuccess('สมัครสมาชิกสำเร็จ! กรุณารอ Admin อนุมัติก่อนเข้าใช้งาน');
      setMode('pending');
    } catch(e) {
      const msg = e.code === 'auth/email-already-in-use' ? 'อีเมลนี้ถูกใช้งานแล้ว' : e.message;
      setErr(msg);
    }
    setLoading(false);
  };

  return (
    <div className="login-container">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">✟</div>
          <div className="login-title">Glory Church</div>
          <div className="login-sub">ระบบบัญชีคริสตจักรพระสิริ</div>
        </div>

        {mode === 'pending' && (
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>⏳</div>
            <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:18,marginBottom:8,color:'#1565C0'}}>รอการอนุมัติ</div>
            {success && <div className="alert alert-success">{success}</div>}
            <div style={{fontSize:13,color:'#64748B',marginBottom:20}}>Admin กำลังตรวจสอบบัญชีของคุณ<br/>กรุณารอการแจ้งเตือน</div>

            <div className="form-group">
              <label className="form-label">อีเมล</label>
              <div className="input-icon-wrap">
                <span className="input-icon">✉️</span>
                <input className="form-control" type="text" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@example.com" />
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">รหัสผ่าน</label>
              <div className="input-icon-wrap">
                <span className="input-icon">🔒</span>
                <input className="form-control" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="รหัสผ่าน (อย่างน้อย 6 ตัว)" />
              </div>
            </div>

            {mode === 'register' && (
              <div className="form-group">
                <label className="form-label">ยืนยันรหัสผ่าน</label>
                <div className="input-icon-wrap">
                  <span className="input-icon">🔒</span>
                  <input className="form-control" type="password" value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})} placeholder="ยืนยันรหัสผ่าน" />
                </div>

            )}

            <button className="btn btn-primary" onClick={mode==='login'?handleLogin:handleRegister} disabled={loading}>
              {loading ? <span className="loader"/> : mode==='login' ? '🔑 เข้าสู่ระบบ' : '📝 สมัครสมาชิก'}
            </button>

        )}
      </div>
    </div>
  );
};

const Transactions = ({ user, transactions, onAdd, onDelete, showToast }) => {
  const [showForm, setShowForm] = useState(false);
  const [filterType, setFilterType] = useState('all');
  const [filterDept, setFilterDept] = useState('all');
  const [filterMonth, setFilterMonth] = useState(0);
  const [filterYear, setFilterYear] = useState(2026);
  const [search, setSearch] = useState('');
  const [form, setForm] = useState({type:'income',dept:'สิบลด',desc:'',amount:'',month:new Date().getMonth()+1,year:2026,week:1});
  const [loading, setLoading] = useState(false);

  const filtered = transactions.filter(t => {
    if (filterType!=='all' && t.type!==filterType) return false;
    if (filterDept!=='all' && t.dept!==filterDept) return false;
    if (filterMonth && t.month!==filterMonth) return false;
    if (t.year!==filterYear) return false;
    if (search && !t.desc.includes(search) && !t.dept.includes(search)) return false;
    return true;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const handleSubmit = async () => {
    if (!form.desc||!form.amount) { showToast('⚠️ กรุณากรอกข้อมูลให้ครบ'); return; }
    setLoading(true);
    await new Promise(r=>setTimeout(r,400));
    const tx = { ...form, id:'t'+Date.now(), amount:parseFloat(form.amount), createdAt:new Date().toISOString().split('T')[0], createdBy:user.id };
    onAdd(tx);
    // Send Telegram notification
    const emoji = tx.type==='income'?'💚':'🔴';
    const typeLabel = tx.type==='income'?'รายรับ':'รายจ่าย';
    const msg = `${emoji} <b>Glory Church - ${typeLabel}ใหม่</b>\n\n📋 รายการ: ${tx.desc}\n🏷️ แผนก: ${tx.dept}\n💰 จำนวน: ${fmtFull(tx.amount)}\n📅 เดือน: ${MONTHS_TH[tx.month-1]} ${tx.year}\n👤 โดย: ${user.name}`;
    sendTelegram(msg);
    setShowForm(false);
    setForm({type:'income',dept:'สิบลด',desc:'',amount:'',month:new Date().getMonth()+1,year:2026,week:1});
    showToast('✅ บันทึกรายการเรียบร้อย');
    setLoading(false);
  };

  const totalIncome = filtered.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
  const totalExpense = filtered.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);

          </div>
          <div style={{width:1,background:'#E0E7FF'}}/>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'#64748B'}}>รายจ่าย</div>
            <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:15,color:'#EF4444'}}>-{fmtFull(totalExpense)}</div>
          </div>
          <div style={{width:1,background:'#E0E7FF'}}/>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'#64748B'}}>คงเหลือ</div>
            <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:15,color:'#1565C0'}}>{fmtFull(totalIncome-totalExpense)}</div>
          </div>
        </div>
      </div>

      {/* Filters */}
      <div className="card" style={{padding:'14px 16px'}}>
        <input className="form-control" placeholder="🔍 ค้นหารายการ..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10}} />
        <div className="filter-bar" style={{marginBottom:8}}>

        </div>
        <div className="filter-bar">
          <button className={`filter-chip ${filterDept==='all'?'active':''}`} onClick={()=>setFilterDept('all')}>ทุกแผนก</button>

              <span className="tx-badge">{tx.dept}</span>

            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
              <div className={`tx-amount ${tx.type}`}>{tx.type==='income'?'+':'-'}{fmtFull(tx.amount)}</div>

                <button onClick={()=>{onDelete(tx.id);showToast('🗑️ ลบรายการแล้ว');}} style={{background:'none',border:'none',color:'#EF4444',fontSize:16,cursor:'pointer',padding:'2px 6px'}}>🗑️</button>

      {/* FAB */}

      {/* Add Form Modal */}
      {showForm && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowForm(false)}}>
          <div className="modal-sheet">
            <div className="modal-handle"/>
            <div className="modal-title">📝 เพิ่มรายการ</div>
            
            {/* Type selector */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              <button onClick={()=>setForm({...form,type:'income'})} style={{padding:'12px',border:`2px solid ${form.type==='income'?'#10B981':'#E0E7FF'}`,borderRadius:10,background:form.type==='income'?'rgba(16,185,129,0.1)':'white',color:form.type==='income'?'#059669':'#64748B',fontFamily:'Sarabun',fontWeight:600,cursor:'pointer',fontSize:14}}>
                💚 รายรับ
              </button>
              <button onClick={()=>setForm({...form,type:'expense'})} style={{padding:'12px',border:`2px solid ${form.type==='expense'?'#EF4444':'#E0E7FF'}`,borderRadius:10,background:form.type==='expense'?'rgba(239,68,68,0.1)':'white',color:form.type==='expense'?'#DC2626':'#64748B',fontFamily:'Sarabun',fontWeight:600,cursor:'pointer',fontSize:14}}>
                🔴 รายจ่าย

            <div className="form-group">
              <label className="form-label">รายละเอียด</label>
              <input className="form-control" placeholder="ระบุรายละเอียด..." value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} />

            <div className="form-group">
              <label className="form-label">จำนวนเงิน (บาท)</label>
              <input className="form-control" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} />

            <div className="form-group">
              <label className="form-label">แผนก</label>
              <select className="form-control" value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})}>

              <div className="form-group">
                <label className="form-label">สัปดาห์</label>
                <select className="form-control" value={form.week} onChange={e=>setForm({...form,week:parseInt(e.target.value)})}>
                  {[1,2,3,4,5].map(w=><option key={w} value={w}>สัปดาห์ที่ {w}</option>)}
                </select>

          </div>
        </div>
      )}
    </div>
  );
};

const Reports = ({ transactions }) => {
  const [year, setYear] = useState(2026);

  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  const totalIncome = yearTxs.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
  const totalExpense = yearTxs.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);

  // Dept data based on selected type
  const deptData = DEPARTMENTS.map((d,i)=>({
    dept:d, icon:DEPT_ICONS[i], color:DEPT_COLORS[i],
    total: yearTxs.filter(t=>t.type===reportType&&t.dept===d).reduce((a,b)=>a+b.amount,0)
  })).filter(d=>d.total>0).sort((a,b)=>b.total-a.total);

  const grandTotal = reportType==='income' ? totalIncome : totalExpense;

  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();
    if (deptData.length===0) return;
    chartInstance.current = new Chart(chartRef.current, {
      type:'doughnut',
      data:{
        labels: deptData.map(d=>d.dept),
        datasets:[{
          data:deptData.map(d=>d.total),
          backgroundColor:deptData.map(d=>d.color),
          borderWidth:2,borderColor:'white'
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:8}}}
      }
    });
  }, [year, transactions, reportType]);

  const monthlyTable = MONTHS_TH.map((m,i)=>{
    const txs = yearTxs.filter(t=>t.month===i+1);
    return {
      month:m,
      income:txs.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0),
      expense:txs.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0),
    };
  }).filter(r=>r.income>0||r.expense>0);

  const isIncome = reportType==='income';
  const typeColor = isIncome ? '#10B981' : '#EF4444';
  const typeLabel = isIncome ? 'รายรับ' : 'รายจ่าย';

  return (
    <div>
      {/* Year selector */}
      <div className="year-pills" style={{marginBottom:12}}>
        {[2022,2023,2024,2025,2026].map(y=>(
          <button key={y} className={`year-pill ${year===y?'active':''}`} onClick={()=>setYear(y)}>ปี {y}</button>
        ))}
      </div>

      {/* Annual summary */}
      <div className="card">
        <div className="card-title" style={{marginBottom:16}}>📊 สรุปประจำปี {year}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {[
            {label:'รายรับรวม',value:totalIncome,color:'#10B981'},
            {label:'รายจ่ายรวม',value:totalExpense,color:'#EF4444'},
            {label:'คงเหลือ',value:totalIncome-totalExpense,color:'#1565C0'},
          ].map((s,i)=>(
            <div key={i} style={{textAlign:'center',padding:'12px 6px',background:'#F8FAFF',borderRadius:10}}>
              <div style={{fontSize:11,color:'#64748B',marginBottom:4}}>{s.label}</div>
              <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:13,color:s.color}}>{fmtFull(s.value)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Toggle Income / Expense */}
      <div className="card" style={{padding:'14px 16px'}}>
        <div className="card-title" style={{marginBottom:12}}>🥧 รายละเอียดตามแผนก</div>

        {/* Toggle buttons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          <button
            onClick={()=>setReportType('income')}
            style={{
              padding:'11px',border:`2px solid ${!isIncome?'#E0E7FF':'#10B981'}`,
              borderRadius:10,background:isIncome?'rgba(16,185,129,0.1)':'white',
              color:isIncome?'#059669':'#64748B',fontFamily:'Sarabun',fontWeight:700,
              cursor:'pointer',fontSize:14,transition:'all 0.2s'
            }}>
            💚 รายรับ
          </button>
          <button
            onClick={()=>setReportType('expense')}
            style={{
              padding:'11px',border:`2px solid ${isIncome?'#E0E7FF':'#EF4444'}`,
              borderRadius:10,background:!isIncome?'rgba(239,68,68,0.1)':'white',
              color:!isIncome?'#DC2626':'#64748B',fontFamily:'Sarabun',fontWeight:700,
              cursor:'pointer',fontSize:14,transition:'all 0.2s'
            }}>
            🔴 รายจ่าย
          </button>
        </div>

        {/* Total for selected type */}
        <div style={{textAlign:'center',padding:'12px',background:isIncome?'rgba(16,185,129,0.08)':'rgba(239,68,68,0.08)',borderRadius:12,marginBottom:16}}>
          <div style={{fontSize:12,color:'#64748B',marginBottom:4}}>{typeLabel}รวมทั้งหมดปี {year}</div>
          <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:24,color:typeColor}}>{fmtFull(grandTotal)}</div>
        </div>

        {/* Chart */}
        {deptData.length > 0 ? (
          <>
            <div className="chart-container"><canvas ref={chartRef}/></div>
            <div className="divider"/>
            {/* Dept list */}
            {deptData.map((d,i)=>(
              <div key={i} style={{padding:'10px 0',borderBottom:i<deptData.length-1?'1px solid #EEF2FF':'none'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:10,height:10,borderRadius:2,background:d.color,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:600}}>{d.icon} {d.dept}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:12,color:'#64748B'}}>{grandTotal?Math.round(d.total/grandTotal*100):0}%</span>
                    <span style={{fontFamily:'Prompt',fontWeight:700,fontSize:13,color:typeColor}}>{fmtFull(d.total)}</span>
                  </div>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${grandTotal?Math.round(d.total/grandTotal*100):0}%`,background:d.color}}/>
                </div>
              </div>
            ))}
          </>
        ) : (
          <div className="empty-state" style={{padding:'24px 0'}}>
            <div className="empty-icon">📭</div>
            <p>ไม่มีข้อมูล{typeLabel}ปี {year}</p>
          </div>
        )}
      </div>

      {/* Monthly table */}
      {monthlyTable.length>0 && (
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div className="card-title">📅 สรุปรายเดือน</div>
            <span className="badge" style={{background:isIncome?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',color:typeColor}}>{typeLabel}</span>
          </div>
          {monthlyTable.map((r,i)=>{
            const val = isIncome ? r.income : r.expense;
            const maxVal = Math.max(...monthlyTable.map(x=>isIncome?x.income:x.expense));
            return (
              <div key={i} style={{padding:'10px 0',borderBottom:i<monthlyTable.length-1?'1px solid #EEF2FF':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontWeight:600,fontSize:14}}>{r.month}</span>
                  <span style={{fontFamily:'Prompt',fontWeight:700,fontSize:14,color:typeColor}}>
                    {isIncome?'+':'-'}{fmtFull(val)}
                  </span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${maxVal?Math.round(val/maxVal*100):0}%`,background:typeColor,opacity:0.7}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ===================== USER MANAGEMENT =====================
const UserManagement = ({ user, showToast }) => {
  const [users, setUsers] = useState({});
  const [loading, setLoading] = useState('');

  useEffect(() => {
    if (db) fbListenUsers(setUsers);
    else setTimeout(() => { if(db) fbListenUsers(setUsers); }, 1500);
  }, []);

  const handleApprove = async (uid, name) => {
    setLoading(uid);
    await fbUpdateUserStatus(uid, 'approved');
    showToast('✅ อนุมัติ ' + name + ' แล้ว');
    setLoading('');
  };

  const handleReject = async (uid, name) => {
    setLoading(uid + '_r');
    await fbUpdateUserStatus(uid, 'rejected');
    showToast('❌ ปฏิเสธ ' + name + ' แล้ว');
    setLoading('');
  };

  const handleRoleToggle = async (uid, currentRole, name) => {
    const newRole = currentRole === 'admin' ? 'user' : 'admin';
    await fbUpdateUserRole(uid, newRole);
    showToast('🔄 เปลี่ยน ' + name + ' เป็น ' + (newRole === 'admin' ? 'Admin' : 'User'));
  };

  const allUsers = Object.entries(users);
  const pending = allUsers.filter(([,u]) => u.status === 'pending');
  const approved = allUsers.filter(([,u]) => u.status === 'approved');
  const rejected = allUsers.filter(([,u]) => u.status === 'rejected');

  const StatusBadge = ({status}) => (
    <span className="badge" style={{background: status==='approved'?'rgba(16,185,129,0.1)':status==='pending'?'rgba(245,158,11,0.1)':'rgba(239,68,68,0.1)', color: status==='approved'?'#059669':status==='pending'?'#D97706':'#DC2626'}}>
      {status==='approved'?'✅ อนุมัติแล้ว':status==='pending'?'⏳ รออนุมัติ':'❌ ปฏิเสธ'}
    </span>
  );

  return (
    <div className="card">
      <div className="card-title" style={{marginBottom:16}}>👥 จัดการสมาชิก ({allUsers.length} คน)</div>

      {pending.length > 0 && (
        <>
          <div style={{fontSize:13,fontWeight:700,color:'#D97706',marginBottom:10}}>⏳ รออนุมัติ ({pending.length})</div>
          {pending.map(([uid, u]) => (
            <div key={uid} style={{background:'rgba(245,158,11,0.06)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{u.name}</div>
                  <div style={{fontSize:12,color:'#64748B'}}>{u.email}</div>
                </div>
                <StatusBadge status={u.status}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <button className="btn btn-success btn-sm" onClick={()=>handleApprove(uid, u.name)} disabled={loading===uid}>
                  {loading===uid?<span className="loader"/>:'✅ อนุมัติ'}
                </button>
                <button className="btn btn-danger btn-sm" onClick={()=>handleReject(uid, u.name)} disabled={loading===uid+'_r'}>
                  {loading===uid+'_r'?<span className="loader"/>:'❌ ปฏิเสธ'}
                </button>
              </div>
            </div>
          ))}
          <div className="divider"/>
        </>
      )}

      {approved.length > 0 && (
        <>
          <div style={{fontSize:13,fontWeight:700,color:'#059669',marginBottom:10}}>✅ สมาชิกที่อนุมัติแล้ว ({approved.length})</div>
          {approved.map(([uid, u]) => (
            <div key={uid} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #EEF2FF'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(135deg,#1565C0,#42A5F5)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:14}}>{u.name?.[0]?.toUpperCase()}</div>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{u.name} {uid===user.id?'(คุณ)':''}</div>
                  <div style={{fontSize:11,color:'#64748B'}}>{u.email}</div>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                <span className={`badge ${u.role==='admin'?'badge-danger':'badge-success'}`}>{u.role==='admin'?'👑 Admin':'👤 User'}</span>
                {uid !== user.id && (
                  <button onClick={()=>handleRoleToggle(uid, u.role, u.name)} style={{background:'none',border:'1px solid #E0E7FF',borderRadius:6,fontSize:10,padding:'2px 8px',cursor:'pointer',color:'#64748B'}}>
                    เปลี่ยนสิทธิ์
                  </button>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {rejected.length > 0 && (
        <>
          <div className="divider"/>
          <div style={{fontSize:13,fontWeight:700,color:'#DC2626',marginBottom:10}}>❌ ถูกปฏิเสธ ({rejected.length})</div>
          {rejected.map(([uid, u]) => (
            <div key={uid} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0'}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                <div style={{fontSize:11,color:'#64748B'}}>{u.email}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <StatusBadge status={u.status}/>
                <button onClick={()=>handleApprove(uid, u.name)} style={{background:'none',border:'1px solid #10B981',borderRadius:6,fontSize:10,padding:'2px 8px',cursor:'pointer',color:'#059669'}}>อนุมัติใหม่</button>
              </div>
            </div>
          ))}
        </>
      )}

      {allUsers.length === 0 && (
        <div className="empty-state" style={{padding:'20px 0'}}>
          <div className="empty-icon">👥</div>
          <p>ยังไม่มีสมาชิก</p>
        </div>
      )}
    </div>
  );
};

// ===================== SETTINGS / PROFILE =====================

  <div>
    <div className="card">
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
        <div style={{width:64,height:64,borderRadius:50,background:'linear-gradient(135deg,#1565C0,#42A5F5)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:24,fontWeight:700}}>{user.avatar}</div>
        <div>
          <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:18}}>{user.name}</div>
          <div style={{fontSize:13,color:'#64748B',marginTop:2}}>{user.email}</div>
          <span className={`badge ${user.role==='admin'?'badge-danger':'badge-success'}`} style={{marginTop:6}}>
            {user.role==='admin'?'👑 ผู้ดูแลระบบ':'👤 ผู้ใช้งาน'}
          </span>
        </div>
      </div>
    </div>

    <div className="card">
      <div className="section-title">⚙️ ตั้งค่าระบบ</div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {[
          {icon:'🔔',label:'การแจ้งเตือน Telegram',desc:'เชื่อมต่อ Bot แจ้งเตือนอัตโนมัติ'},
          {icon:'🔥',label:'Firebase Database',desc:'ซิงค์ข้อมูลแบบเรียลไทม์'},
          {icon:'📤',label:'ส่งออกรายงาน',desc:'Export เป็น PDF หรือ Excel'},
          {icon:'👥',label:'จัดการผู้ใช้',desc:'เพิ่ม/ลบ ผู้ใช้งาน 12 คน'},
        ].map((item,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px',background:'#F8FAFF',borderRadius:10}}>
            <span style={{fontSize:22}}>{item.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{item.label}</div>
              <div style={{fontSize:12,color:'#64748B'}}>{item.desc}</div>
            </div>
            <span style={{color:'#64748B'}}>›</span>
          </div>
        ))}
      </div>
    </div>

    <div className="card" style={{background:'#FFF8F8'}}>
      <div className="alert alert-info" style={{marginBottom:16}}>
        <b>🔧 วิธีเชื่อมต่อ Firebase & Telegram</b><br/>
        แก้ไขค่าตัวแปรในโค้ดส่วน CONFIG:<br/>
        • FIREBASE_CONFIG - ใส่ค่าจาก Firebase Console<br/>
        • TELEGRAM_BOT_TOKEN - Token จาก @BotFather<br/>
        • TELEGRAM_CHAT_ID - ID กลุ่ม/ช่อง Telegram
      </div>
      <button className="btn btn-danger" onClick={onLogout}>🚪 ออกจากระบบ</button>
    </div>
  </div>
);

// ===================== MAIN APP =====================
const App = () => {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [transactions, setTransactions] = useState(DEMO_TRANSACTIONS);
  const [toast, setToast] = useState(null);
  const [fbStatus, setFbStatus] = useState('connecting');
  const [authReady, setAuthReady] = useState(false);

  useEffect(() => {
    initFirebase();
    const check = setInterval(() => {
      if (firebaseReady) {
        clearInterval(check);
        setFbStatus('online');
        fbListenTx((txs) => { if (txs.length > 0) setTransactions(txs); });
        fbOnAuthChange(async (firebaseUser) => {
          setAuthReady(true);
          if (firebaseUser) {
            const profile = await fbGetUserProfile(firebaseUser.uid);
            if (profile && profile.status === 'approved') {
              setUser({ id: firebaseUser.uid, email: firebaseUser.email, name: profile.name, role: profile.role || 'user', avatar: profile.name?.[0]?.toUpperCase() || 'U' });
            } else {
              setUser(null);
            }
          } else {
            setUser(null);
          }
        });
      }
    }, 500);
    setTimeout(() => { if (!firebaseReady) { setFbStatus('offline'); setAuthReady(true); } }, 6000);
  }, []);

  const showToast = (msg) => setToast(msg);

  const addTx = (tx) => {
    fbSaveTx(tx);
    setTransactions(prev => {
      if (prev.find(t=>t.id===tx.id)) return prev;
      return [tx, ...prev];
    });
  };

  const deleteTx = (id) => {
    fbDeleteTx(id);
    setTransactions(prev => prev.filter(t=>t.id!==id));
  };

  if (!authReady) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#0D47A1,#1565C0,#42A5F5)'}}>
      <div style={{textAlign:'center',color:'white'}}>
        <div style={{fontSize:60,marginBottom:16}}>✟</div>
        <div style={{fontFamily:'Prompt',fontWeight:700,fontSize:20,marginBottom:8}}>Glory Church</div>
        <div style={{opacity:0.8,fontSize:14,marginBottom:20}}>กำลังโหลดระบบ...</div>
        <div style={{width:40,height:40,border:'3px solid rgba(255,255,255,0.3)',borderTop:'3px solid white',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto'}}/>
      </div>
    </div>
  );
  if (!user) return <AuthPage onLogin={setUser} />;

  const tabs = [
    {id:'dashboard',icon:'🏠',label:'หน้าหลัก'},
    {id:'transactions',icon:'📋',label:'รายการ'},
    {id:'reports',icon:'📊',label:'รายงาน'},
    {id:'settings',icon:'⚙️',label:'ตั้งค่า'},
  ];

  return (
    <>
      <div className="navbar">
        <div className="navbar-brand">
          <div className="navbar-logo">✟</div>
          <div>
            <div className="navbar-title">Glory Church</div>
            <div className="navbar-subtitle">ระบบบัญชีคริสตจักรพระสิริ</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11,opacity:0.85}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:fbStatus==='online'?'#4ADE80':fbStatus==='connecting'?'#FCD34D':'#F87171',boxShadow:`0 0 6px ${fbStatus==='online'?'#4ADE80':fbStatus==='connecting'?'#FCD34D':'#F87171'}`}}/>
            {fbStatus==='online'?'ออนไลน์':fbStatus==='connecting'?'กำลังเชื่อมต่อ...':'ออฟไลน์'}
          </div>
          <div className="navbar-user" onClick={()=>setTab('settings')}>
            <div className="navbar-avatar">{user.avatar}</div>
            <span style={{fontSize:12}}>{user.name.split(' ')[0]}</span>
          </div>
        </div>
      </div>

      <div className="main-content">
        {tab==='dashboard' && <Dashboard user={user} transactions={transactions} onAdd={addTx} />}
        {tab==='transactions' && <Transactions user={user} transactions={transactions} onAdd={addTx} onDelete={deleteTx} showToast={showToast} />}
        {tab==='reports' && <Reports transactions={transactions} />}
        {tab==='settings' && <Settings user={user} onLogout={async ()=>{ await fbLogout(); setUser(null); }} showToast={showToast} />}
      </div>

      <div className="bottom-nav">
        {tabs.map(t=>(
          <button key={t.id} className={`bottom-nav-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            <span className="nav-icon">{t.icon}</span>
            <span>{t.label}</span>
            {tab===t.id && <div className="nav-dot"/>}
          </button>
        ))}
      </div>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
